task:
  name : task_hands_on_exercises
  description: >
    Create engaging, hands-on coding exercises for {topic} for beginner/intermediate learners.

        Use the Practical Course Content to identify skills that need practice.

        Create 4 TYPES OF EXERCISES:

        1. GUIDED EXERCISES (40%)
           - Step-by-step instructions
           - Fill-in-the-blanks code
           - Complete partially written functions
           - Fix broken code

           Create 20-25 exercises:
           - 10 very guided (beginner)
           - 8 moderately guided (intermediate)
           - 5-7 minimal guidance (confident)

        2. MINI-CHALLENGES (30%)
           - Small self-contained problems
           - Clear input/output specs
           - Multiple solutions possible
           - Quick completion (10-30 min each)

           Create 15-20 challenges across difficulty levels

        3. BUILD-ALONG EXERCISES (20%)
           - Follow tutorial to build feature
           - Add your own enhancements
           - Extend provided code
           - Customize and experiment

           Create 6-8 build-along exercises

        4. DEBUGGING CHALLENGES (10%)
           - Find and fix bugs
           - Explain what was wrong
           - Improve code quality
           - Refactor exercises

           Create 5-7 debugging challenges

        FOR EACH EXERCISE PROVIDE:

        STRUCTURE:
        - Exercise number and title
        - Difficulty rating (⭐ to ⭐⭐⭐⭐⭐)
        - Time estimate
        - Clear goal ("Build X that does Y")
        - Acceptance criteria

        STARTER CODE:
        - TODO comments for guidance
        - Type hints and interfaces
        - Helper functions provided
        - Test cases included

        HINTS SYSTEM (3 levels):
        - Hint 1: Conceptual nudge
        - Hint 2: Technical direction
        - Hint 3: Pseudo-code or example

        SOLUTION:
        - Working solution code
        - Explanation of approach
        - Alternative solutions
        - Common mistakes
        - Extensions to try

        Make exercises feel like games, celebrate small wins, ensure achievability.
