task:
  name : task_case_studies
  description: >
    Create real-world case studies for {topic} showing production applications at scale.

        Use the Comprehensive Research Report to identify real company use cases.

        Create 4 TYPES OF CASE STUDIES:

        1. ARCHITECTURE CASE STUDIES (40%)
           - How major companies use {topic}
           - System design decisions at scale
           - Performance and scalability achieved
           - Lessons learned from production

           Target companies: Netflix, Uber, Airbnb, Spotify, Google, Amazon, etc.
           Create 5-6 architecture case studies

        2. MIGRATION CASE STUDIES (25%)
           - Company migrated from technology X to {topic}
           - Business reasons for migration
           - Technical challenges during migration
           - Results and improvements achieved
           - ROI and metrics

           Create 3-4 migration stories

        3. PROBLEM-SOLVING CASE STUDIES (20%)
           - Specific technical problem at scale
           - How {topic} solved it uniquely
           - Alternative approaches considered
           - Trade-offs and design decisions
           - Quantifiable results

           Create 3-4 problem-focused studies

        4. FAILURE CASE STUDIES (15%)
           - When {topic} wasn't the right choice
           - What went wrong and why
           - Warning signs they missed
           - Lessons learned the hard way
           - Better alternatives they switched to

           Create 2-3 failure stories for learning

        FOR EACH CASE STUDY PROVIDE:

        STRUCTURE:

        1. COMPANY CONTEXT (10%)
           - Company name and industry
           - Scale (users, data, traffic)
           - Technical stack before
           - Business challenges

        2. SITUATION ANALYSIS (15%)
           - The problem or opportunity
           - Why it was critical
           - Constraints and requirements
           - Previous attempts and failures

        3. SOLUTION WITH {topic} (30%)
           - Why they chose {topic}
           - Architecture and design
           - Implementation approach
           - Technical innovations
           - Integration challenges

        4. CHALLENGES & SOLUTIONS (20%)
           - Major obstacles encountered
           - How they overcame them
           - Unexpected issues
           - Creative solutions

        5. RESULTS & METRICS (15%)
           - Performance improvements (with numbers)
           - Cost savings or efficiency gains
           - User experience improvements
           - Business impact

        6. LESSONS LEARNED (10%)
           - What worked well
           - What they'd do differently
           - Advice for others
           - Future plans

        LEARNING ACTIVITIES FOR EACH CASE:

        1. ANALYSIS QUESTIONS
           - Technical decision analysis
           - Trade-off discussions
           - Alternative approach evaluation

        2. DISCUSSION PROMPTS
           - "Would you have made the same choice?"
           - "What would you do differently?"
           - "How would this apply to [your context]?"

        3. PRACTICAL EXERCISE
           - Recreate simplified architecture
           - Design similar system for different scale
           - Identify bottlenecks and optimizations

        4. DESIGN CHALLENGE
           - "Design a similar system for [scenario]"
           - "How would you handle [specific challenge]?"
           - "Propose improvements to their architecture"

        DELIVERABLES FOR LEARNERS:

        For each case study:
        - Reading material (3-5 pages)
        - Architecture diagram recreation exercise
        - Analysis questions (5-7 questions)
        - Design proposal assignment
        - Discussion forum prompts

        Sources to use:
        - Engineering blogs (company tech blogs)
        - Conference presentations (QCon, GOTO, etc.)
        - Technical whitepapers
        - Podcast interviews with engineers
        - Open-source code repositories

        Prioritize recent case studies (last 3-5 years) for relevance.
        Include diverse company sizes (startups to FAANG).
        Cover different industries and use cases.
  expected_output: >
