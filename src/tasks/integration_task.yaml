task:
  name: "Integrate Course Components"
  description: >
    Integrate the outputs of the planner, writer, and workshop agents into a unified,
    structured course. The integrator combines the course plan, all lessons, workshop
    sessions, and resources into one coherent Course output. It also adapts the structure
    based on the selected strategy (academic, practical, or comprehensive).

  agent: src/agents/integrator_agent.yaml

  context:
    - planner_output
    - writer_outputs
    - workshop_outputs
    - strategy  # academic | practical | comprehensive

  expected_output: >
    A finalized Course JSON object containing:
      - title and description
      - plan
      - lessons
      - workshops
      - resources
      - key_takeaways
      - strategy-specific sections:
          * academic → algorithm_implementations, paper_analyses, theoretical_exercises
          * practical → code_challenges, hands_on_exercises, project_building
          * comprehensive → case_studies, mini_projects, mixed_exercises

  output_json: 'Course'
