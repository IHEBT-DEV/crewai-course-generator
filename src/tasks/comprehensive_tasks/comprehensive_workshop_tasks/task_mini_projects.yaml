    - Combined: O(n log n)

    ## Empirical Results

    | Input Size | Measured Time | Predicted (theory) | Ratio |
    |------------|---------------|-------------------|-------|
    | 100        | 0.0001s       | 0.0001s          | 1.00x |
    | 1,000      | 0.0018s       | 0.0020s          | 0.90x |
    | 10,000     | 0.0247s       | 0.0266s          | 0.93x |
    | 100,000    | 0.3301s       | 0.3322s          | 0.99x |

    ## Analysis

    **Does it match theory?**
    Yes! The measured performance closely follows the O(n log n) prediction.
    The ratio stays close to 1.0x, confirming our complexity analysis.

    **Why not exactly 1.0x?**
    - Constant factors not captured in Big-O
    - Memory allocation overhead
    - CPU cache effects at different sizes
    - Python interpreter overhead

    **Bottlenecks Identified:**
