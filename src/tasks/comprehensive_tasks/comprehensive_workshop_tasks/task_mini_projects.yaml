    **Step 1: Performance Benchmarking (30 min)**

    Measure how your implementation actually performs:
    ````python
    # benchmark.py

    import time
    import matplotlib.pyplot as plt
    from main import YourSystem

    def benchmark_scaling():
        Test how performance scales with input size

        sizes = [100, 500, 1000, 5000, 10000, 50000, 100000]
        times = []

        for n in sizes:
            # Generate test data
            data = generate_test_data(n)

            # Measure time
            system = YourSystem()
            start = time.time()
            system.operation1(data)
            elapsed = time.time() - start

            times.append(elapsed)
            print(f"n=n:6d: elapsed:.4f s")

        return sizes, times

    def plot_results(sizes, times):
        Visualize performance

        plt.figure(figsize=(10, 6))

        # Plot actual performance
        plt.plot(sizes, times, 'b-o', label='Measured', linewidth=2)

        # Plot theoretical prediction (if O(n log n))
        import numpy as np
        theoretical = [n * np.log(n) * times[0] / (sizes[0] * np.log(sizes[0]))
                       for n in sizes]
        plt.plot(sizes, theoretical, 'r--', label='O(n log n) theoretical', linewidth=2)

        plt.xlabel('Input Size (n)', fontsize=12)
        plt.ylabel('Time (seconds)', fontsize=12)
        plt.title('Performance Analysis', fontsize=14)
        plt.legend(fontsize=10)
        plt.grid(True, alpha=0.3)
        plt.savefig('performance_analysis.png', dpi=300, bbox_inches='tight')
        plt.show()

    if __name__ == "__main__":
        print("Running performance benchmarks...")
        sizes, times = benchmark_scaling()
        plot_results(sizes, times)
        print("\nGraph saved to: performance_analysis.png")
    ````

