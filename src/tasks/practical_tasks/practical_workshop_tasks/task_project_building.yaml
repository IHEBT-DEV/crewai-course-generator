task:
  name : task_project_building
  description: >
    Create engaging, portfolio-worthy projects for {topic} for beginner/intermediate learners.

        Use the Practical Course Content to design projects that showcase skills.

        Create 3 TYPES OF PROJECTS:

        1. MINI-PROJECTS (5-6 projects)
           - Duration: 30 min - 2 hours each
           - Quick wins, single feature focus
           - Complete and working
           - Spread throughout course

           Examples:
           - Quick start project (Module 0)
           - Feature projects (Modules 1-2)
           - Integration projects (Modules 3-4)

        2. MODULE PROJECTS (4-5 projects)
           - Duration: 3-6 hours each
           - One per major module
           - Multiple features
           - Building complexity progressively

           Each project should:
           - Demonstrate module concepts
           - Be practical and useful
           - Have clear milestones
           - Be portfolio-worthy

        3. CAPSTONE PROJECT (1 comprehensive project)
           - Duration: 10-20 hours
           - Final course project
           - Comprehensive application
           - True portfolio showcase
           - Multiple options to choose from

           Should integrate:
           - All course concepts
           - Best practices
           - Professional quality

        FOR EACH PROJECT PROVIDE:

        PROJECT BRIEF:
        - Catchy name and tagline
        - What you'll build and why it's cool
        - What you'll learn/practice
        - Time estimate
        - Difficulty level
        - Prerequisites

        REQUIREMENTS:
        - Core features (must-have)
        - Stretch features (optional enhancements)
        - Visual mockup description
        - Success criteria

        STEP-BY-STEP GUIDE:
        - Setup instructions
        - Implementation phases
        - Milestones and checkpoints
        - Testing guidelines

        STARTER PACK:
        - Boilerplate code (when appropriate)
        - Project structure
        - Assets (if needed)
        - Example data

        SHOWCASE GUIDE:
        - How to demo
        - Screenshots to take
        - Portfolio presentation
        - LinkedIn post template

        Make projects exciting, achievable, and portfolio-ready.
  expected_output: >
