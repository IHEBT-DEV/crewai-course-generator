task:
  name : task_mixed_exercises
  description: >
    Create integrated exercises combining theory and practice for {topic} for intermediate/advanced learners.

    Use the Comprehensive Course Content to design exercises that bridge concepts and implementation.

        Create 4 TYPES OF INTEGRATED EXERCISES:

        1. IMPLEMENT & ANALYZE (40%)
           - Implement algorithm or system
           - Measure performance empirically
           - Compare to theoretical predictions
           - Explain discrepancies

           Create 12-15 exercises with both coding and analysis

        2. DESIGN & JUSTIFY (30%)
           - Design a solution to a problem
           - Explain design choices theoretically
           - Analyze trade-offs
           - Implement and validate

           Create 8-10 design exercises

        3. COMPARE & CONTRAST (20%)
           - Implement multiple approaches
           - Benchmark them empirically
           - Analyze theoretically
           - Recommend best for different scenarios

           Create 6-8 comparison exercises

        4. EXTEND & OPTIMIZE (10%)
           - Start with basic implementation
           - Analyze performance bottlenecks
           - Apply theoretical insights
           - Optimize and measure improvement

           Create 3-5 optimization exercises

        FOR EACH EXERCISE PROVIDE:

        THREE COMPONENTS:

        PART A: CONCEPTUAL (30%)
        - Theory questions
        - Explain concepts
        - Analyze algorithms
        - Predict behavior

        PART B: IMPLEMENTATION (40%)
        - Write code
        - Multiple approaches
        - Handle edge cases
        - Test thoroughly

        PART C: ANALYSIS (30%)
        - Measure performance
        - Compare with theory
        - Generate insights
        - Write mini-report

        DELIVERABLES:
        - Written answers to theory questions
        - Source code (commented)
        - Test suite
        - Benchmark results
        - Analysis report
        - README with findings

        Ensure exercises build complete understanding of both theory and practice.
