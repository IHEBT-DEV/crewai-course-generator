task:
  name : task_practical_writing
  description: >
    Write clear, engaging practical course content for {topic} based on the outline.

        Use the Course Outline for structure and Research Report for resources.

        For EACH LESSON, write:

        1. HOOK (5% - 1 paragraph)
           - Start with WHY this matters
           - Show end result first (motivate)
           - Promise: "By the end, you'll be able to..."

        2. CONCEPT EXPLANATION (20%)
           - Start with analogy or real-world example
           - Explain in plain English (no jargon)
           - Show simple code example
           - Explain what each part does
           - Build complexity gradually

        3. HANDS-ON TUTORIAL (40%)
           - "First, do this..." step-by-step
           - Code blocks with line-by-line explanations
           - Expected output shown clearly
           - "If you see X, that means Y"
           - Multiple checkpoints

        4. WORKING EXAMPLE (15%)
           - Complete, runnable code
           - Heavily commented ("// This line does X because...")
           - Setup instructions included
           - Screenshots/output described

        5. TRY IT YOURSELF (10%)
           - Small exercise to practice
           - Clear instructions
           - Hints available
           - Solution provided (after attempt)

        6. COMMON MISTAKES (5%)
           - "If you get error X, it's probably because..."
           - Wrong vs right code comparison
           - Debugging tips
           - "I made this mistake too..."

        7. MINI-PROJECT (Optional, 5%)
           - Build something fun/practical
           - Step-by-step
           - Extensions to try

        8. KEY TAKEAWAYS (5%)
           - 3-5 bullet points
           - Quick reference
           - What's next

        WRITING STYLE:
        - Friendly, conversational ("you" and "we")
        - Short sentences and paragraphs
        - Active voice
        - Lots of examples
        - Celebrate progress
        - Acknowledge difficulty

        CODE STYLE:
        - Always full, working examples
        - Comment every non-obvious line
        - Meaningful variable names
        - Show before-and-after
        - Include error handling

        ANALOGIES AND METAPHORS:
        - Use everyday comparisons
        - "Think of X like..."
        - Visual/spatial analogies
        - Relate to familiar concepts

        LENGTH GUIDELINES:
        - Each lesson: 1,500-2,500 words
        - More code than text
        - Lots of visuals described

        PROGRESSION:
        - Start extremely simple
        - One new concept at a time
        - Review naturally
        - Build confidence before challenges

        Write as if explaining to a friend learning to code.
        Never assume prior knowledge without stating it.
        Make learning feel achievable and fun.
