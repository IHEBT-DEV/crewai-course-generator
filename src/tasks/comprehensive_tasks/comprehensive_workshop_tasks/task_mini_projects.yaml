task:
  name : task_mini_projects
  description: >
    Create intermediate-sized projects for {topic} that require both theoretical understanding and practical implementation.

        Use the Comprehensive Course Content to design projects that bridge theory and practice.

        Create 3 PROJECT TIERS:

        1. FOUNDATION PROJECTS (4-5 hours each)
           - Apply core concepts from modules 1-2
           - Single algorithm or system component
           - Theory + Practice integration
           - Example: "Implement and analyze a bloom filter"

           Create 2-3 foundation projects

        2. INTERMEDIATE PROJECTS (6-8 hours each)
           - Integrate multiple concepts
           - More complex system with several components
           - Performance analysis required
           - Example: "Build a mini search engine with indexing"

           Create 2-3 intermediate projects

        3. ADVANCED PROJECTS (8-12 hours each)
           - Comprehensive system with multiple features
           - Optimization and scaling considerations
           - Research component (compare approaches)
           - Example: "Build distributed cache with consistency guarantees"

           Create 1-2 advanced projects

        PROJECT STRUCTURE:

        Each project must include:

        1. PROJECT BRIEF (10%)
           - What you're building and why
           - Learning objectives (theory + practice)
           - Theoretical concepts applied
           - Time estimate
           - Prerequisites

        2. REQUIREMENTS (15%)
           **Functional Requirements:**
           - Core features (must-have)
           - Extended features (nice-to-have)
           - Input/output specifications

           **Theoretical Requirements:**
           - Explain algorithm choices
           - Analyze complexity
           - Compare approaches
           - Justify design decisions

           **Technical Requirements:**
           - Performance targets
           - Testing requirements
           - Code quality standards

        3. PROJECT PHASES (50%)
           **Phase 1: Design (15% of project time)**
           - Research and planning
           - Algorithm selection with justification
           - Architecture design
           - Design document deliverable

           **Phase 2: Implementation (50% of time)**
           - Core functionality
           - Extended features
           - Testing
           - Refactoring

           **Phase 3: Analysis (20% of time)**
           - Performance testing
           - Complexity analysis
           - Theory-practice comparison
           - Results documentation

           **Phase 4: Reflection (15% of time)**
           - What worked well
           - Challenges faced
           - Lessons learned
           - Improvements identified

        4. DELIVERABLES (15%)
           - Source code (well-commented)
           - Test suite (unit + integration)
           - Design document (2-3 pages)
           - Analysis report (2-4 pages)
           - README with setup and usage

        5. EVALUATION RUBRIC (10%)
           - Implementation quality (40%)
           - Theoretical understanding (30%)
           - Analysis & insights (20%)
           - Documentation (10%)

        For each project provide:
        - Detailed project description
        - Starter code/structure
        - Test cases framework
        - Benchmark framework
        - Example datasets
        - Solution guide

        Projects should be:
        - Portfolio-worthy
        - Demonstrate both theory and practice
        - Achievable but substantial
        - Real-world applicable
