    Debug Challenge 1.1: Find the Bug ⭐⭐ (15 min)
    THE PROBLEM:
    This code is supposed to calculate the average of a list, but it has bugs!
    def calculate_average(numbers):
        Calculate the average of a list of numbers
        total = 0
        for num in numbers:
            total + num
        return total / len(numbers)

    # Test
    print(calculate_average([1, 2, 3, 4, 5]))  # Should print 3.0
    print(calculate_average([10, 20]))         # Should print 15.0
    WHEN YOU RUN IT:

    First test prints: 0.0 (WRONG!)
    What's the issue?

    YOUR TASK:

    Find ALL the bugs (there are 2!)
    Fix them
    Explain what was wrong

    HINTS:
    <details>
    <summary>💡 Hint 1</summary>
    Look carefully at the line inside the loop. Is something missing?
    </details>
    <details>
    <summary>💡 Hint 2</summary>
    What if the list is empty? Will this crash?
    </details>
    <details>
    <summary>✅ Solution</summary>
    Bugs Found:

    Line 4: total + num doesn't save the result!

    Should be: total += num or total = total + num


    No check for empty list!

    Will crash with division by zero



    Fixed Code:
    def calculate_average(numbers):
        Calculate the average of a list of numbers
        if not numbers:  # Fix bug #2
            return 0

        total = 0
        for num in numbers:
            total += num  # Fix bug #1
        return total / len(numbers)
    Explanation:

    Bug #1 was a common mistake: forgetting to assign the result back to total
    Bug #2 is an edge case: always check for empty inputs!

    </details>
    LEARN FROM THIS:

    Always assign results (+= not just +)
    Always think about edge cases
    Test with different inputs!

