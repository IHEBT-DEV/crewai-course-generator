task:
  name : task_theoretical_exercises
  description: >
    Create rigorous theoretical exercises and problem sets for {topic} based on the academic course content.

        Use the Academic Course Content to identify key concepts that need reinforcement through exercises.

        Create 4 TYPES OF EXERCISES:

        1. PROOF EXERCISES (40% of exercises)
           - Prove theorems or lemmas
           - Show correctness of algorithms
           - Prove complexity bounds (upper/lower)
           - Construct counter-examples
           - Prove properties of data structures

           Difficulty levels:
           - Easy: Direct application of definitions (5 exercises)
           - Medium: Multi-step reasoning (8 exercises)
           - Hard: Creative proofs (4 exercises)
           - Challenge: Research-level (2 exercises)

        2. ALGORITHM ANALYSIS EXERCISES (30% of exercises)
           - Analyze time/space complexity
           - Derive recurrence relations and solve them
           - Compare algorithms theoretically
           - Prove optimality or find better bounds
           - Worst-case vs average-case analysis

           Include:
           - 6 complexity analysis problems
           - 4 recurrence solving problems
           - 3 algorithm comparison problems

        3. CONCEPTUAL QUESTIONS (20% of exercises)
           - Explain concepts deeply
           - Compare and contrast approaches
           - Discuss assumptions and limitations
           - Trace algorithm execution step-by-step
           - Justify design decisions

           Include:
           - 5 explanation questions
           - 3 comparison questions
           - 3 trace/execution questions

        4. MATHEMATICAL PROBLEMS (10% of exercises)
           - Apply mathematical techniques
           - Derive formulas related to algorithms
           - Solve equations in algorithm analysis
           - Probabilistic analysis
           - Combinatorial problems

           Include:
           - 3 derivation problems
           - 2 probabilistic problems

        FOR EACH EXERCISE PROVIDE:

        STRUCTURE:
        - Exercise number and title
        - Difficulty rating (⭐ to ⭐⭐⭐⭐)
        - Point value (5-20 points based on difficulty)
        - Clear problem statement
        - Relevant background/context
        - What needs to be proven/analyzed/explained
        - Any assumptions or constraints

        HINTS (for harder problems):
        - Hint 1: Subtle guidance (after 15 min)
        - Hint 2: Reference to relevant theorem (after 30 min)
        - Hint 3: Suggested proof technique (after 45 min)

        COMPLETE SOLUTIONS:
        - Step-by-step formal solution
        - Alternative approaches (when applicable)
        - Common mistakes to avoid
        - Grading rubric (point breakdown)
        - Connection to course concepts

        Organize exercises by course module.
        Ensure coverage of all major theoretical concepts.
        Build upon previous exercises progressively.
  expected_output: >
