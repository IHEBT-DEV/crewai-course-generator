    Optimize Challenge O.1: Speed It Up! ⭐⭐⭐ (20 min)
    THE CHALLENGE:
    This code works but it's too slow! Make it faster!
    BASELINE CODE:
    language// This works but is O(n²) - too slow for large inputs!
    function slowSolution(data) {
        [inefficient but correct code]
    }

    // Performance:
    // n=1000:   2.5s
    // n=10000:  250s (too slow!)
    YOUR GOAL:
    Optimize this to handle n=10,000 in under 1 second
    REQUIREMENTS:

    ✓ Must produce same results
    ✓ Must handle all edge cases
    ✓ Target: O(n log n) or better
    ✓ Time limit: < 1s for n=10,000

    ───────────────────────────────────────────────
    YOUR OPTIMIZED SOLUTION:
    languagefunction fastSolution(data) {
        // Your optimized code here

    }

    // Benchmark it!
    const testData = generateData(10000);
    const start = Date.now();
    fastSolution(testData);
    const elapsed = Date.now() - start;
    console.log(`Time: elapse dms`);  // Goal: < 1000ms
    ───────────────────────────────────────────────
    HINTS:
    💡 Hint 1: Data Structure
    <details>
    <summary>Click for hint</summary>
    The nested loop is the problem. What data structure gives O(1) lookup?
    </details>
    💡 Hint 2: Algorithm
    <details>
    <summary>Click for hint</summary>
    You can solve this in a single pass with [technique]
    </details>
    ───────────────────────────────────────────────
    SOLUTION:
    <details>
    <summary>✅ Optimized Solution</summary>
    ```language
    function fastSolution(data) {
        // Optimized O(n log n) or O(n) approach
        [efficient code]
    }
    ```
    Complexity:

    Time: O(...) - improved from O(n²)
    Space: O(...) - trade-off explained

    Performance:

    n=1000:   0.05s  (50x faster!)
    n=10000:  0.8s   (300x faster!)
    - n=100000: 12s    (scales well!)

    **Key Optimizations:**
    1. **[Optimization 1]:** Changed [from X to Y] - saves [amount]
    2. **[Optimization 2]:** Used [technique/data structure] - reduces complexity
    3. **[Optimization 3]:** Eliminated [wasteful operation]

    **Why It's Faster:**
    [Detailed explanation of what makes this approach better]

    </details>

    **LEARNING POINTS:**
    - When you see nested loops, think: can I use a hash map?
    - Space-time trade-offs: sometimes using more memory saves time
    - Profile before optimizing: measure where the bottleneck is

