task:
  name : task_algorithm_implementation
  description: >
    Create advanced programming assignments for {topic} requiring algorithm implementation and analysis.
  
            Use the Academic Course Content to identify algorithms that need implementation.
  
            Create 4 TYPES OF ASSIGNMENTS:
  
            1. ALGORITHM IMPLEMENTATION (40%)
               - Implement algorithms from pseudocode or papers
               - Optimize implementations
               - Handle edge cases rigorously
               - Verify correctness formally
  
               Create 3-4 assignments:
               - Basic: 1-2 core algorithms (1-2 weeks)
               - Advanced: Complex algorithm from paper (2-3 weeks)
               - Optimization: Improve baseline (1-2 weeks)
  
            2. PERFORMANCE ANALYSIS (30%)
               - Benchmark implementations
               - Compare theoretical vs empirical complexity
               - Profile and optimize code
               - Generate performance graphs and analysis
  
               Create 2-3 assignments requiring:
               - Extensive benchmarking
               - Graph generation
               - Statistical analysis
               - Written reports
  
            3. RESEARCH REPRODUCTION (20%)
               - Reproduce results from papers
               - Implement baseline algorithms for comparison
               - Generate figures and tables from papers
               - Write research-style report
  
               Create 1-2 assignments:
               - Reproduce paper experiment
               - Compare multiple algorithms
  
            4. EXTENSION CHALLENGES (10%)
               - Extend algorithms to new cases
               - Propose and implement optimizations
               - Mini research projects
  
               Create 2-3 open-ended challenges
  
            FOR EACH ASSIGNMENT PROVIDE:
  
            SPECIFICATION:
            - Assignment title and number
            - Due date suggestion (weeks from start)
            - Points total
            - Formal problem description
            - Input/output specifications
            - Correctness criteria
            - Performance requirements
            - Test cases (visible + hidden)
  
            RESOURCES:
            - References to papers/book chapters
            - Starter code skeleton (optional)
            - Dataset links or generation code
            - Evaluation/testing scripts
            - Grading rubric
  
            DELIVERABLES:
            - Source code (well-commented)
            - Test suite
            - Performance analysis report
            - Written report (for major assignments)
            - README with build/run instructions
  
            GRADING CRITERIA:
            - Correctness (40%)
            - Performance/Efficiency (25%)
            - Code quality (15%)
            - Analysis/Report (20%)
  
            Include detailed implementation requirements and analysis expectations.
