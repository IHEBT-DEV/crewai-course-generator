    STARTER:
    def filter_evens(numbers):
        Return only the even numbers from the list
        # Your code here
        pass

    # Tests (don't change!)
    assert filter_evens([1,2,3,4,5,6]) == [2,4,6]
    assert filter_evens([1,3,5]) == []
    assert filter_evens([]) == []
    assert filter_evens([0, -2, 3]) == [0, -2]
    print("🎉 All tests passed!")
    HINTS:
    <details>
    <summary>💡 Hint 1</summary>
    Remember: A number is even if `number % 2 == 0`
    </details>
    <details>
    <summary>💡 Hint 2</summary>
    Loop through the numbers and check each one.
    If it's even, add it to your result list.
    </details>
    <details>
    <summary>💡 Solution (try first!)</summary>
    ```python
    def filter_evens(numbers):
        result = []
        for num in numbers:
            if num % 2 == 0:
                result.append(num)
        return result
    Or with list comprehension:
    def filter_evens(numbers):
    return [num for num in numbers if num % 2 == 0]
    </details>

