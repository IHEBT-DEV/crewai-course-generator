task:
  name : task_comprehensive_writing
  description: >
    Write thorough, balanced course content for {topic} integrating theory and practice.

        Use the Course Outline for structure and Research Report for content.

        For EACH LESSON, write with INTEGRATION in mind:

        1. OVERVIEW (5%)
           - Why this lesson matters (practical + theoretical)
           - What you'll learn (concepts + skills)
           - How it fits in bigger picture
           - Learning objectives clearly stated

        2. CONCEPTUAL FOUNDATION (20%)
           - Core idea explained intuitively
           - Formal definition follows
           - Visual/mental model
           - Historical context
           - "The key insight is..."

        3. THEORETICAL DEEP DIVE (20%)
           - How it works in detail
           - Algorithm with complexity
           - Design principles
           - Mathematical foundations (accessible)
           - Citations to papers [Author, Year]

        4. PRACTICAL DEMONSTRATION (20%)
           - Code example showing concept
           - Step-by-step walkthrough
           - Multiple examples (simple → complex)
           - Real-world use cases

        5. HANDS-ON TUTORIAL (20%)
           - Build something using concept
           - Detailed instructions with code
           - Explain design decisions
           - Point out theory in practice

        6. INTEGRATION ANALYSIS (10%)
           - How theory guides implementation
           - How practice validates theory
           - Trade-offs and alternatives
           - When to use what
           - Performance implications

        7. EXERCISES (5%)
           - Theory questions
           - Coding challenges
           - Design problems
           - Analysis tasks

        WRITING STYLE:
        - Professional but accessible
        - Technical precision without jargon overload
        - Conversational for explanations
        - Formal for definitions
        - Balance rigor and readability

        INTEGRATION TECHNIQUES:
        - "Theoretically X, in practice this means..."
        - "The O(n log n) complexity means for 1M items..."
        - "The formal definition is X, in code..."
        - Show how theory predicts practical behavior

        CODE PRESENTATION:
        - Production-quality code
        - Type annotations
        - Error handling
        - Performance notes in comments
        - Multiple implementations when relevant

        LENGTH GUIDELINES:
        - Each lesson: 2,500-4,000 words
        - Balance text and code
        - Depth without overwhelming

        Write for learners who want complete mastery.
        Respect their intelligence while ensuring clarity.
        Prepare them for both research and building systems.
