task:
  name : task_code_challenges
  description: >
    Create coding challenges and puzzles for {topic} for skill development and interview prep.

        Use the Practical Course Content to design challenges that reinforce skills.

        Create 5 TYPES OF CHALLENGES:

        1. ALGORITHM CHALLENGES (30%)
           - Solve problems using {topic}
           - Multiple test cases
           - Optimize solutions
           - Interview-style

           Create 15-20 challenges across difficulty

        2. DEBUGGING CHALLENGES (25%)
           - Fix broken code
           - Identify bugs
           - Improve code quality
           - Common mistakes

           Create 10-15 debugging scenarios

        3. CODE GOLF / OPTIMIZATION (20%)
           - Make code shorter
           - Make code faster
           - Reduce memory
           - Elegant solutions

           Create 8-10 optimization challenges

        4. REAL-WORLD SCENARIOS (15%)
           - Business logic
           - Data processing
           - API integration
           - Practical problems

           Create 6-8 scenario-based challenges

        5. PUZZLE CHALLENGES (10%)
           - Creative problem-solving
           - Think outside the box
           - Multiple approaches
           - "Aha!" moments

           Create 4-5 puzzles

        FOR EACH CHALLENGE PROVIDE:

        STRUCTURE:
        - Challenge title
        - Difficulty (⭐ to ⭐⭐⭐⭐⭐)
        - Time target
        - Problem statement
        - Input/output specs
        - Examples
        - Constraints

        TEST CASES:
        - Example cases (visible)
        - Edge cases (some hidden)
        - Performance cases
        - Expected outputs

        HINTS (progressive):
        - Available after time delays
        - Increasingly specific
        - Don't give away solution

        SOLUTION:
        - Optimal solution
        - Alternative approaches
        - Complexity analysis
        - Explanation

        Make challenges engaging, gamified, interview-relevant.
  expected_output: >
